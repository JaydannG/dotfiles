enable_audio_bell no
confirm_os_window_close 0

# background transparency
background_opacity 0.90

# -------------------------------
# Catppuccin Mocha (Mauve Accent)
# -------------------------------

background #1e1e2e
foreground #cdd6f4

# Cursor
cursor #f5e0dc

# Selection
selection_background #45475a
selection_foreground #cdd6f4

# URL color
url_color #89b4fa

# Tabs (if you use them)
active_tab_background #cba6f7
active_tab_foreground #1e1e2e
inactive_tab_background #181825
inactive_tab_foreground #a6adc8

# -------------------------------
# ANSI Colors
# -------------------------------

# Normal
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #cba6f7   # 👈 mauve instead of pink
color6  #94e2d5
color7  #bac2de

# Bright
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #cba6f7   # 👈 mauve highlight
color14 #94e2d5
color15 #a6adc8

# Padding (makes it feel less cramped)
window_padding_width 10

# Smooth font rendering
font_family JetBrainsMono Nerd Font
font_size 12.5
